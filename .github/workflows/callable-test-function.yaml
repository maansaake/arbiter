name: Function test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  function-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version-alias:
          - "stable"
          - "oldstable"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Golang ${{ matrix.go-version-alias }}
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go-version-alias }}
          cache: false

      - name: Checksum
        id: checksum
        run: |
          checksum=$(
            {
              sha256sum go.mod go.sum

              # Exclude _test files; they are not needed to build the code and
              # they change more often than the actual build inputs.
              find . -type f -name "*.go" ! -name "*_test.go" -print0 | \
                sort -z | xargs -0 sha256sum
            } | sha256sum | awk '{print $1}'
          )
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Cache Go module cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/go/pkg/mod
          key: function-test-go-mod-${{ hashFiles('go.sum') }}

      - name: Cache Go build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/go-build
          key: function-test-go-build-${{ matrix.go-version-alias }}-${{ steps.checksum.outputs.checksum }}
          restore-keys: |
            function-test-go-build-${{ matrix.go-version-alias }}-

      - name: Run samplemod executable
        run: make examples/samplemod/run
