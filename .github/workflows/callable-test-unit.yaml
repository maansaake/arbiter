name: Unit test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Disable the builtin caching since it uses the hash of the go.sum file
      # to determine if the cache is valid. This is not ideal since the go.sum
      # file is updated every time a new version of a dependency is downloaded.
      # Not when your code changes.
      - name: Set up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Checksum
        id: checksum
        run: |
          sha256sum go.mod go.sum > modsum.txt

          # Exclude _test files, they are not needed to build the code and they change more often than the actual code. 
          find . -type f -name "*.go" ! -name "*_test.go" -exec sha256sum {} \; > gosum.txt
          sha256sum modsum.txt gosum.txt > totalmodsum.txt
          sha256sum totalmodsum.txt > totalmodsum.txt
          echo "checksum=$(cat totalmodsum.txt | awk '{print $1}')" >> $GITHUB_OUTPUT

      # Use restore-keys to always use a cache that was created with the same
      # prefix.
      - name: Cache go modules and the buildcache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: unit-test-${{ steps.checksum.outputs.checksum }}
          restore-keys: unit-test-

      - name: Run tests
        run: go test ./... -v -failfast -timeout 10s -coverprofile=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          file: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: false

      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage-report-${{ matrix.go-version-alias }}
          path: coverage.html
