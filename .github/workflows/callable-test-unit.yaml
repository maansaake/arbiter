name: Unit test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version-alias:
          - "stable"
          - "oldstable"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Golang ${{ matrix.go-version-alias }}
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ matrix.go-version-alias }}
          cache: false

      - name: Checksum
        id: checksum
        run: |
          checksum=$(
            {
              sha256sum go.mod go.sum

              # Exclude _test files; they are not needed to build the code and
              # they change more often than the actual build inputs.
              find . -type f -name "*.go" ! -name "*_test.go" -print0 | \
                sort -z | xargs -0 sha256sum
            } | sha256sum | awk '{print $1}'
          )
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Cache Go module cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/go/pkg/mod
          key: unit-test-go-mod-${{ hashFiles('go.sum') }}

      - name: Cache Go build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/go-build
          key: unit-test-go-build-${{ matrix.go-version-alias }}-${{ steps.checksum.outputs.checksum }}
          restore-keys: |
            unit-test-go-build-${{ matrix.go-version-alias }}-

      - name: Run tests
        run: make test/unit/json


      - name: Publish test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Unit tests
          path: build/unit-test-output.json
          reporter: golang-json
          fail-on-error: "false"

      - name: Generate coverage report
        run: go tool cover -html=build/coverage.out -o build/coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage-report-${{ matrix.go-version-alias }}
          path: build/coverage.html
