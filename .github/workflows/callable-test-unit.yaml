name: Unit test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version-alias:
          - "stable"
          - "oldstable"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Golang ${{ matrix.go-version-alias }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version-alias }}
          cache: false

      - name: Checksum
        id: checksum
        run: |
          sha256sum go.mod go.sum > modsum.txt

          # Exclude _test files, they are not needed to build the code and they change more often than the actual code. 
          find . -type f -name "*.go" ! -name "*_test.go" -exec sha256sum {} \; > gosum.txt
          sha256sum modsum.txt gosum.txt > totalmodsum.txt
          sha256sum totalmodsum.txt > totalmodsum.txt
          echo "checksum=$(cat totalmodsum.txt | awk '{print $1}')" >> $GITHUB_OUTPUT

      # Use restore-keys to always use a cache that was created with the same
      # prefix.
      - name: Cache go modules and the buildcache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: unit-test-${{ matrix.go-version-alias }}-${{ steps.checksum.outputs.checksum }}
          restore-keys: unit-test-

      - name: Run tests
        run: make test/unit-json

      - name: Publish test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Unit tests
          path: build/unit-test-output.json
          reporter: golang-json
          fail-on-error: "false"

      - name: Generate coverage report
        run: go tool cover -html=build/coverage.out -o build/coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage-report-${{ matrix.go-version-alias }}
          path: build/coverage.html
