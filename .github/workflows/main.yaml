name: Main branch protection

run-name: "Main branch protection: ${{ format('{0} #{1}', github.ref_name, github.run_number) }}"

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/callable-build.yaml

  unit-test:
    uses: ./.github/workflows/callable-test-unit.yaml

  function-test:
    uses: ./.github/workflows/callable-test-function.yaml
